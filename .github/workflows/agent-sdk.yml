name: agent-sdk

on:
  push:
    branches: [feat/agent-sdk-design, main]
    paths:
      - "packages/**"
      - "lib/**"
      - "app/**"
      - "components/**"
      - "tests/**"
      - ".github/workflows/agent-sdk.yml"
  pull_request:
    paths:
      - "packages/**"
      - "lib/**"
      - "app/**"
      - "components/**"
      - "tests/**"

jobs:
  test-bun:
    name: Test on Bun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      - run: cd packages/agent && bun run typecheck
      - run: cd packages/agent && bun run test
      - run: cd packages/agent && bun run build

  bench:
    name: Bench regression check
    needs: test-bun
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      - run: cd packages/agent && bun run build
      - name: Run bench (>10% regression fails CI)
        run: cd packages/agent && node dist/cli.js bench
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  test-node:
    name: Test on Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - run: bun install --frozen-lockfile
      # Use tsconfig.lib.json which excludes src/cli/**/*.tsx — the
      # CLI uses ink (React 18-tuned types) and hoisted @types/react
      # at the repo root is React 19, causing "Box cannot be used as
      # a JSX component" errors. The library build itself is React-
      # agnostic, so excluding the CLI is the correct fix.
      - run: cd packages/agent && npx tsc --noEmit -p tsconfig.lib.json
      - run: cd packages/agent && bun run build
      - name: Verify CLI runs on Node 20
        run: |
          out=$(node packages/agent/dist/cli.js --version)
          echo "$out"
          echo "$out" | grep -qE "^livepeer [0-9]"

  storyboard-regression:
    name: Storyboard zero-regression gate (T10 + smoke)
    needs: test-bun
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Build @livepeer/agent (workspace deps for storyboard)
        run: cd packages/agent && bun run build
      - name: Run T10 regression gate
        run: npx playwright test tests/e2e/T10-storyboard-regression.spec.ts --reporter=line
      - name: Run storyboard structural smoke
        run: npx playwright test tests/e2e/storyboard.spec.ts --reporter=line
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
